<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Serviços | Obra Control</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/tables.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>🏗 Obra Control</h2>
            </div>

            <nav class="menu">
                <a href="../index.html">📊 Dashboard</a>
                <a href="obras.html">🏢 Obras</a>
                <a href="pavimentos.html">🏗 Pavimentos</a>
                <a href="servicos.html">📋 Serviços</a>
                <a href="#">📈 Relatórios</a>
                <a href="#">⚙️ Configurações</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Serviços</h1>

                <div class="user-area">
                    Diego Oliveira
                </div>
            </header>

            <section class="dashboard">
                <div class="form-card">
                    <form id="servico-form">
                        <div class="form-group">
                            <label for="obra">Obra</label>

                            <select id="obra" required>
                                <option value="">Selecione uma obra</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="pavimento">Pavimento</label>

                            <select id="pavimento" required>
                                <option value="">Selecione um pavimento</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="nome">Serviço</label>

                            <input type="text" id="nome" placeholder="Ex: Alvenaria" required>
                        </div>

                        <div class="form-group">
                            <label for="status">Status</label>

                            <select id="status">
                                <option>Planejamento</option>
                                <option>Em andamento</option>
                                <option>Concluído</option>
                            </select>
                        </div>

                        <button class="btn-primary" type="submit">
                            Cadastrar Serviço
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/servicos.js"></script>
</body>

</html>
