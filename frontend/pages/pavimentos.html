<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pavimentos | Obra Control</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/tables.css">
</head>

<body>

    <div class="container">

        <aside class="sidebar">
            <div class="logo">
                <h2>🏗 Obra Control</h2>
            </div>

            <nav class="menu">
                <a href="../index.html">
                    📊 Dashboard
                </a>

                <a href="obras.html">
                    🏢 Obras
                </a>

                <a href="pavimentos.html">
                    🏗 Pavimentos
                </a>

                <a href="#">
                    📋 Serviços
                </a>

                <a href="#">
                    📈 Relatórios
                </a>

                <a href="#">
                    ⚙️ Configurações
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Pavimentos</h1>

                <div class="user-area">
                    Diego Oliveira
                </div>
            </header>

            <section class="dashboard">
                <div class="dashboard-header">
                    <h2>Cadastro de Pavimentos</h2>
                    <p>Cadastre os pavimentos de cada obra.</p>
                </div>

                <div class="form-card">
                    <form id="pavimento-form">
                        <div class="form-group">
                            <label for="obra">Obra</label>

                            <select id="obra" required>
                                <option value="">Selecione uma obra</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="nome">Nome do Pavimento</label>

                            <input type="text" id="nome" placeholder="Ex: Térreo" required>
                        </div>

                        <div class="form-group">
                            <label for="descricao">Descrição</label>

                            <input type="text" id="descricao" placeholder="Descrição do pavimento">
                        </div>

                        <div class="form-group">
                            <label for="status">Status</label>

                            <select id="status">
                                <option>Planejamento</option>
                                <option>Em andamento</option>
                                <option>Concluído</option>
                            </select>
                        </div>

                        <button class="btn-primary" type="submit">
                            Cadastrar Pavimento
                        </button>
                    </form>
                </div>

                <div class="table-card">
                    <h3>Estrutura das Obras</h3>

                    <div id="lista-obras"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/pavimentos.js"></script>
</body>

</html>
